version: '3.8'

services:
  pocketbase:
    build:
      context: ./pocketbase
      dockerfile: Dockerfile
    container_name: honesty-store-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - POCKETBASE_ENCRYPTION_KEY=${POCKETBASE_ENCRYPTION_KEY}
    volumes:
      - ./pb_data:/pb_data
    networks:
      - honesty-store-network

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: honesty-store-nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_ENCRYPTION_KEY=${POCKETBASE_ENCRYPTION_KEY}
    depends_on:
      - pocketbase
    networks:
      - honesty-store-network

  nginx:
    image: nginx:alpine
    container_name: honesty-store-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - nextjs
    networks:
      - honesty-store-network

networks:
  honesty-store-network:
    driver: bridge

volumes:
  pb_data:
    driver: local